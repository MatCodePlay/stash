<div id="tasks-list" class="stash-grid">
    {% for task in tasks %}
    <div class="stash-card">
        <div class="stash-flex-between">
            <div class="stash-flex-center">
                <form hx-put="/tasks/{{ task.id }}?page={{ page }}" hx-target="#tasks-list" hx-swap="innerHTML">
                    <button type="submit" class="stash-checkbox {% if task.is_done %}checked{% endif %}">
                        {% if task.is_done %}
                        <svg class="stash-checkbox-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                        </svg>
                        {% endif %}
                    </button>
                </form>
                <span class="stash-task-text{% if task.is_done %} stash-task-done{% endif %}">{{ task.content }}</span>
            </div>
            <form hx-delete="/tasks/{{ task.id }}?page={{ page }}" hx-target="#tasks-list" hx-swap="innerHTML">
                <button type="submit" class="stash-delete">
                    <svg class="stash-delete-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </form>
        </div>
        <div class="stash-text-sm stash-task-meta">
            {% if task.is_done and task.completed_at %}
                done: {{ task.completed_at.strftime('%Y-%m-%d %H:%M') }}
            {% elif task.created_at %}
                created: {{ task.created_at.strftime('%Y-%m-%d %H:%M') }}
            {% endif %}
        </div>
    </div>
    {% else %}
    <div class="stash-empty stash-card">No tasks yet. Add one above!</div>
    {% endfor %}
</div>
