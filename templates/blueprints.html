{% extends "base.html" %}

{% block content %}
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-semibold text-gray-800">Blueprints</h1>
    </div>

    <div class="card p-6 mb-8">
        <form hx-post="/blueprints" class="space-y-4">
            <div>
                <input type="text" name="title" id="bp-title" placeholder="Blueprint title..." required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <input type="text" name="description" placeholder="Description (optional)..."
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500">
            </div>
            <div class="flex justify-end">
                <button type="submit" id="bp-submit" class="btn-primary px-6 py-3 text-sm disabled:opacity-50 disabled:cursor-not-allowed" disabled>Create Blueprint</button>
            </div>
        </form>
        <script>
            const bpTitle = document.getElementById('bp-title');
            const bpSubmit = document.getElementById('bp-submit');
            bpTitle.addEventListener('input', function() {
                bpSubmit.disabled = !this.value.trim();
            });
            document.querySelector('form[hx-post="/blueprints"]').addEventListener('htmx:afterRequest', function() {
                bpTitle.value = '';
                bpSubmit.disabled = true;
            });
        </script>
    </div>

    <div id="blueprints-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for bp in blueprints %}
        <a href="/blueprints/{{ bp.id }}" class="card p-6 hover:scale-[1.02] transition-all cursor-pointer group" style="border-top: 4px solid #0071e3">
            <h3 class="text-xl font-semibold text-gray-800 group-hover:text-blue-600">{{ bp.title }}</h3>
            <p class="text-sm text-gray-500 mt-2">{{ bp.description or 'No description' }}</p>
        </a>
        {% else %}
        <div class="col-span-2 card p-8 text-center text-gray-500">
            No blueprints yet. Create one above!
        </div>
        {% endfor %}
    </div>
{% endblock %}
