{% for node in nodes %}
<div id="node-{{ node.id }}" class="card p-5 
    {% if node.status == 'In Progress' %}bg-blue-50/50 border border-blue-100
    {% elif node.status == 'Completed' %}bg-green-50/50 border border-green-100
    {% elif node.status == 'Rejected' %}bg-red-50/50 border border-red-100
    {% else %}bg-white/50 border border-gray-100{% endif %}">
    <div class="flex items-start justify-between">
        <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
                <h3 class="text-lg font-medium text-gray-800">{{ node.title }}</h3>
                <div class="relative group">
                    <button type="button" class="px-2 py-1 text-xs rounded-full flex items-center gap-1 hover:bg-gray-200 transition-colors
                        {% if node.status == 'Completed' %}bg-green-100 text-green-700
                        {% elif node.status == 'In Progress' %}bg-blue-100 text-blue-700
                        {% elif node.status == 'Rejected' %}bg-red-100 text-red-700
                        {% else %}bg-gray-100 text-gray-700{% endif %}">
                        {{ node.status }}
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="absolute left-0 top-full -mt-2 pt-2 z-10">
                        <div class="hidden group-hover:flex flex-col bg-white/95 backdrop-blur-xl rounded-lg shadow-lg border border-gray-100 p-1 min-w-[120px]">
                            <form hx-post="/blueprints/{{ blueprint.id }}/status/{{ node.id }}" hx-target="#node-{{ node.id }}" hx-swap="outerHTML">
                                <input type="hidden" name="status" value="New">
                                <button type="submit" class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 rounded">New</button>
                            </form>
                            <form hx-post="/blueprints/{{ blueprint.id }}/status/{{ node.id }}" hx-target="#node-{{ node.id }}" hx-swap="outerHTML">
                                <input type="hidden" name="status" value="In Progress">
                                <button type="submit" class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 rounded">In Progress</button>
                            </form>
                            <form hx-post="/blueprints/{{ blueprint.id }}/status/{{ node.id }}" hx-target="#node-{{ node.id }}" hx-swap="outerHTML">
                                <input type="hidden" name="status" value="Completed">
                                <button type="submit" class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 rounded">Completed</button>
                            </form>
                            <form hx-post="/blueprints/{{ blueprint.id }}/status/{{ node.id }}" hx-target="#node-{{ node.id }}" hx-swap="outerHTML">
                                <input type="hidden" name="status" value="Rejected">
                                <button type="submit" class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 rounded">Rejected</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% if node.url %}
            <a href="{{ node.url }}" target="_blank" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
                Open Link
            </a>
            {% endif %}
            {% if node.notes %}
            <p class="text-sm text-gray-600 mt-2 whitespace-pre-wrap">{{ node.notes }}</p>
            {% endif %}
            <p class="text-xs text-gray-400 mt-2">{{ node.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
        </div>
    </div>
</div>
{% endfor %}
