<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - STASH</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif; }
        .btn-primary { background: #0071e3; color: white; border-radius: 8px; transition: all 0.2s; }
        .btn-primary:hover { background: #0077ed; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl shadow-xl p-10">
            <div class="text-center mb-8">
                <svg class="w-12 h-12 mx-auto" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="14" stroke="#0071e3" stroke-width="2"/>
                    <path d="M16 8C16 8 12 12 12 16C12 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <path d="M16 8C16 8 20 12 20 16C20 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="16" cy="16" r="3" fill="#0071e3"/>
                </svg>
                <h1 class="text-2xl font-semibold text-gray-800 mt-4">Sign In</h1>
                <p class="text-sm text-gray-500 mt-2">Enter your credentials to continue</p>
            </div>
            
            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm mb-6">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" name="email" required
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all"
                            placeholder="fromostrzeszow@gmail.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all"
                            placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary w-full py-3 text-base font-medium">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
