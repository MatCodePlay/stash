<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - STASH</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/cards.css">
    <link rel="stylesheet" href="/static/css/inputs.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="stash-card stash-login-card">
            <div class="login-logo">
                <svg class="login-logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="14" stroke="#0071e3" stroke-width="2"/>
                    <path d="M16 8C16 8 12 12 12 16C12 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <path d="M16 8C16 8 20 12 20 16C20 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="16" cy="16" r="3" fill="#0071e3"/>
                </svg>
            </div>
            <h1 class="login-title">Sign In</h1>
            <p class="login-subtitle">Enter your credentials to continue</p>
            
            {% if error %}
            <div class="login-error">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="login-form-group">
                    <label class="login-form-label">Email</label>
                    <input type="email" name="email" required
                        class="stash-input"
                        placeholder="fromostrzeszow@gmail.com">
                </div>
                <div class="login-form-group">
                    <label class="login-form-label">Password</label>
                    <input type="password" name="password" required
                        class="stash-input"
                        placeholder="••••••••">
                </div>
                <button type="submit" class="stash-button stash-button-full">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
