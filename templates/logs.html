{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl">
    <h1 class="text-3xl font-semibold text-gray-800 mb-6">Activity Log</h1>

    <div class="card overflow-hidden">
        <table class="w-full">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date & Time</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for log in logs %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm text-gray-700">{{ log.description }}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">{{ log.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="2" class="px-6 py-8 text-center text-gray-500">No activity recorded yet</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
