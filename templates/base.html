<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STASH</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <link rel="stylesheet" href="/static/css/cards.css">
    <link rel="stylesheet" href="/static/css/inputs.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
</head>
<body>
    <div class="stash-layout">
        <aside class="stash-sidebar">
            <div class="stash-logo">
                <svg class="stash-logo-icon" viewBox="0 0 32 32" fill="none">
                    <circle cx="16" cy="16" r="14" stroke="#0071e3" stroke-width="2"/>
                    <path d="M16 8C16 8 12 12 12 16C12 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <path d="M16 8C16 8 20 12 20 16C20 20 16 24 16 24" stroke="#0071e3" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="16" cy="16" r="3" fill="#0071e3"/>
                </svg>
                <span>STASH</span>
            </div>
            <nav class="stash-nav">
                <a href="/" class="stash-nav-item" id="nav-dashboard">Dashboard</a>
                <a href="/tasks" class="stash-nav-item" id="nav-tasks">Tasks</a>
                <a href="/journal" class="stash-nav-item" id="nav-journal">Journal</a>
                <a href="/blueprints" class="stash-nav-item" id="nav-blueprints">Blueprints</a>
                <a href="/logs" class="stash-nav-item" id="nav-logs">Activity</a>
            </nav>
            <script>
                const path = window.location.pathname;
                const map = {'/': 'nav-dashboard', '/tasks': 'nav-tasks', '/journal': 'nav-journal', '/blueprints': 'nav-blueprints', '/logs': 'nav-logs'};
                const activeId = map[path] || 'nav-dashboard';
                document.getElementById(activeId)?.classList.add('active');
            </script>
            <div class="stash-sidebar-footer">
                <p class="stash-user-email">{{ request.session.get('email', 'Admin') }}</p>
                <a href="/logout" class="stash-logout">
                    <svg class="stash-logout-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </a>
            </div>
        </aside>
        <main class="stash-main">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
