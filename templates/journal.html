{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl">
    <h1 class="text-3xl font-semibold text-gray-800 mb-6">Journal</h1>

    <div class="card p-6 mb-6">
        <form hx-post="/journal" hx-target="#journal-list" hx-swap="innerHTML">
            <textarea name="content" rows="3" placeholder="Write your thoughts..."
                class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500 resize-none"></textarea>
            <div class="flex justify-end mt-3">
                <button type="submit" class="btn-primary px-6 py-2 text-sm">Save Entry</button>
            </div>
        </form>
    </div>

    <div id="journal-list" class="space-y-4">
        {% for entry in entries %}
        <div class="card p-5">
            <div class="flex items-start gap-4">
                <div class="w-2 h-2 rounded-full bg-blue-500 mt-2 flex-shrink-0"></div>
                <div class="flex-1">
                    <p class="text-gray-700 whitespace-pre-wrap">{{ entry.content }}</p>
                    <p class="text-sm text-gray-400 mt-2">{{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
                </div>
            </div>
        </div>
        {% else %}
        <div class="card p-8 text-center text-gray-500">No journal entries yet. Start writing!</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
