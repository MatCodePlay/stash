{% extends "base.html" %}

{% block content %}
    <div class="stash-page-container">
        <div class="stash-header">
            <a href="/blueprints" class="stash-back-link">&larr; Back to Blueprints</a>
            <h1 class="stash-page-title-accent">{{ blueprint.title }}</h1>
            <p class="stash-text-sm">{{ blueprint.description }}</p>
        </div>

        <div class="stash-card">
            <label class="stash-label">Add New Node</label>
            <form hx-post="/blueprints/{{ blueprint.id }}" hx-target="#nodes-container" hx-swap="innerHTML" id="node-form">
                <div class="stash-form-row">
                    <input type="text" name="title" id="node-title" placeholder="Node title..." required class="stash-input">
                    <input type="text" name="url" id="node-url" placeholder="URL (optional)..." class="stash-input">
                </div>
                <div class="stash-form-group">
                    <textarea name="notes" id="node-notes" rows="2" placeholder="Notes..." class="stash-textarea"></textarea>
                </div>
                <div class="stash-flex justify-end">
                    <button type="submit" class="stash-button">Add Node</button>
                </div>
            </form>
            <script>
                document.getElementById('node-form').addEventListener('htmx:afterRequest', function() {
                    document.getElementById('node-title').value = '';
                    document.getElementById('node-url').value = '';
                    document.getElementById('node-notes').value = '';
                });
            </script>
        </div>

        <div id="nodes-container">
            {% include "_nodes_list.html" %}
        </div>
    </div>
{% endblock %}
