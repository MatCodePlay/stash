<div id="journal-list" class="apple-grid" style="gap: 16px;">
    {% for entry in entries %}
    <div class="apple-card" style="padding: 1.5rem;">
        <div class="flex items-start gap-4">
            <div class="w-2 h-2 rounded-full bg-blue-500 mt-2 flex-shrink-0"></div>
            <div class="flex-1">
                <p class="text-gray-700 whitespace-pre-wrap">{{ entry.content }}</p>
                <p class="apple-text-sm mt-3">{{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>
    </div>
    {% else %}
    <div class="apple-empty apple-card">No journal entries yet. Start writing!</div>
    {% endfor %}
</div>
