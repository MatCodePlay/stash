<div id="journal-list" class="stash-grid">
    {% for entry in entries %}
    <div class="stash-card">
        <div class="stash-flex-center stash-flex-start">
            <div class="stash-journal-dot"></div>
            <div class="flex-1">
                <p class="stash-journal-content whitespace-pre-wrap">{{ entry.content }}</p>
                <p class="stash-text-sm mt-3">{{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>
    </div>
    {% else %}
    <div class="stash-empty stash-card">No journal entries yet. Start writing!</div>
    {% endfor %}
</div>
