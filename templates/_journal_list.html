<div id="journal-list" class="space-y-4">
    {% for entry in entries %}
    <div class="card p-5">
        <div class="flex items-start gap-4">
            <div class="w-2 h-2 rounded-full bg-blue-500 mt-2 flex-shrink-0"></div>
            <div class="flex-1">
                <p class="text-gray-700 whitespace-pre-wrap">{{ entry.content }}</p>
                <p class="text-sm text-gray-400 mt-2">{{ entry.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>
    </div>
    {% else %}
    <div class="card p-8 text-center text-gray-500">No journal entries yet. Start writing!</div>
    {% endfor %}
</div>
