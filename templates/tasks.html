{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-semibold text-gray-800">Tasks</h1>
    </div>

    <div class="card p-6 mb-6">
        <form hx-post="/tasks" hx-target="#tasks-list" hx-swap="innerHTML" class="flex gap-3">
            <input type="text" name="content" placeholder="Add a new task..." 
                class="flex-1 px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:border-blue-500">
            <button type="submit" class="btn-primary px-6 py-2 text-sm">Add</button>
        </form>
    </div>

    <div id="tasks-list" class="space-y-3">
        {% for task in tasks %}
        <div class="card p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <form hx-put="/tasks/{{ task.id }}" hx-target="#tasks-list" hx-swap="innerHTML">
                    <button type="submit" class="w-5 h-5 rounded-full border-2 {% if task.is_done %}bg-blue-500 border-blue-500{% else %}border-gray-300 hover:border-blue-400{% endif %} flex items-center justify-center">
                        {% if task.is_done %}
                        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                        </svg>
                        {% endif %}
                    </button>
                </form>
                <span class="{% if task.is_done %}text-gray-400 line-through{% else %}text-gray-800{% endif %}">{{ task.content }}</span>
            </div>
            <form hx-delete="/tasks/{{ task.id }}" hx-target="#tasks-list" hx-swap="innerHTML">
                <button type="submit" class="text-gray-400 hover:text-red-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </form>
        </div>
        {% else %}
        <div class="card p-8 text-center text-gray-500">No tasks yet. Add one above!</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
